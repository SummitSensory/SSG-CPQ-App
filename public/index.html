  .login-brandname{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:19px;margin-top:9px;}
  .login-brandsub{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:#8a8f85;margin-top:2px;}
  .brand-name{font-size:13px;letter-spacing:.02em;line-height:1.25;}
  .brand-name b{display:block;font-weight:600;font-size:14.5px;}
  .brand-name span{color:#8a8f85;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;}
  .login-card h1{font-size:24px;margin-bottom:5px;text-align:center;}
  .login-sub{color:#82877d;font-size:13.5px;margin-bottom:24px;text-align:center;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:12px;font-weight:500;letter-spacing:.03em;text-transform:uppercase;color:#82877d;margin-bottom:6px;}
  .field input{width:100%;padding:11px 12px;border:1px solid #dcded7;border-radius:10px;font-size:14.5px;background:#fff;color:#20241f;outline:none;transition:border-color .12s,box-shadow .12s;}
  .field input:focus{border-color:#3d4a55;box-shadow:0 0 0 3px rgba(61,74,85,.15);}
  .btn{width:100%;padding:12px 16px;border:none;border-radius:10px;background:#3d4a55;color:#fff;font-size:14.5px;font-weight:600;transition:background .12s;}
  .btn:hover{background:#2c353d;}
  .btn:disabled{opacity:.6;cursor:default;}
  .err{background:#fbecea;border:1px solid #f0ccc6;color:#9c3327;font-size:13px;padding:9px 12px;border-radius:9px;margin-bottom:15px;}
  .hint{margin-top:18px;font-size:12px;color:#a0a49a;text-align:center;line-height:1.5;}

  /* --- Shell --- */
  .shell{display:grid;grid-template-columns:240px 1fr;min-height:100%;}
  .side{background:#fbfbf9;border-right:1px solid #e7e8e3;display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh;}
  .side .brand{padding:0 6px;margin-bottom:22px;}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1;}
  .nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 11px;border:none;border-radius:9px;background:transparent;color:#4a4f47;font-size:14px;font-weight:500;}
  .nav-item .ico{width:18px;height:18px;flex:0 0 auto;opacity:.7;}
  .nav-item:hover{background:#eef0ea;}
  .nav-item.active{background:#e8ebef;color:#2c353d;font-weight:600;}
  .nav-item.soon{color:#b3b7ac;}
  .nav-item.soon:hover{background:#f2f3ef;}
  .nav-tag{margin-left:auto;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;background:#eef0ea;color:#a0a49a;padding:2px 6px;border-radius:5px;font-weight:600;}
  .side-foot{border-top:1px solid #eef0ea;padding-top:14px;margin-top:10px;}
