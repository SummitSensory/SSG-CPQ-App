# Staging blueprint for Render. Secrets are set in the Render dashboard, never here.
services:
  - type: web
    name: dev-foundation-staging
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    branch: main
    healthCheckPath: /health
    preDeployCommand: pnpm db:migrate:deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase: { name: dev-foundation-db, property: connectionString }
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
databases:
  - name: dev-foundation-db
    plan: starter
